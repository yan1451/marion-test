<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/style.css" />
    <title>PixiJS - Template</title>

    <style>
      #app {
        aspect-ratio: 16 / 9;
        max-width: 100%;
        max-height: 100vh;
        margin: auto;
        position: relative; /* Importante para camadas futuras */
        overflow: hidden; /* Garante que nada saia da proporção */
      }

      #pixi-container,
      #pixi-container canvas {
        width: 100%;
        height: 100%;
        display: block;
      }

      body {
        margin: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        background-color: #1a1a1a; /* Cor de fundo da página */
      }
    </style>
  </head>

  <body>
    <div id="app">
      <div id="pixi-container"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
