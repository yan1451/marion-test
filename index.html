<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/style.css" />
    <title>PixiJS - Template</title>

    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background-color: #1a1a1a;
        overflow: hidden;
        display: flex;
        align-items: center;
        background-color: transparent; 

        justify-content: center;
      }
      body::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image: url("/assets/bank_roberry_slot/animation/BACKGROUND.png");
        background-size: cover;
        background-position: center;

        filter: blur(10px);

        transform: scale(1.1);
        z-index: -1;
      }

      #app {
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      #pixi-container {
        width: 1400px;
        height: 850px;
        min-width: 1400px;
        min-height: 850px;
        max-width: 1400px;
        max-height: 850px;
        box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
      } 
    </style>
  </head>

  <body>
    <div id="app">
      <div id="pixi-container"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
